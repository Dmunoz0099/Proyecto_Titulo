<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport: imprescindible para que el diseño sea responsivo
         y se vea bien en celulares y tablets. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cuidado de Adultos Mayores</title>

    <!-- Fuente "Hanken Grotesk" usada en el diseño del login.
         preconnect acelera la conexión con los servidores de Google Fonts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- React se "monta" dentro de este div (ver main.jsx). -->
    <div id="root"></div>

    <!-- Punto de entrada del frontend. type="module" habilita ES Modules. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
